<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F6F3FC;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 48px 24px;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #847B7B;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      width: 100%;
      max-width: 1100px;
    }

    .card {
      background: #A97EC2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 36px;
      gap: 20px;
      position: relative;
      overflow: hidden;
      min-height: 320px;
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      position: absolute;
      bottom: 20px;
    }

    .si-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 200px;
    }

    .ghost {
      position: absolute;
      font-size: clamp(100px, 10vw, 150px);
      font-weight: 400;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      user-select: none;
      top: 20px;
      left: 50%;
      transform: translateX(-42%);
    }

    .main-si {
      position: relative;
      z-index: 2;
      font-size: clamp(80px, 8vw, 120px);
      font-weight: 400;
      color: #fff;
      transform: translate(10px, -8px);
      text-shadow:
        2px 3px 0 rgba(120,50,75,0.9),
        4px 6px 0 rgba(120,50,75,0.75),
        6px 9px 0 rgba(120,50,75,0.6),
        8px 12px 0 rgba(120,50,75,0.45),
        10px 15px 0 rgba(120,50,75,0.3),
        12px 18px 0 rgba(120,50,75,0.15),
        14px 21px 16px rgba(0,0,0,0.2);
    }

    .f-pinyon  { font-family: 'Pinyon Script', cursive; }
    .f-vibes   { font-family: 'Great Vibes', cursive; }
    .f-dancing { font-family: 'Dancing Script', cursive; }
    .f-cormo   { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }

    @media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <h1>Font comparison — "Si"</h1>
  <div class="grid">

    <div class="card">
      <div class="si-wrap">
        <span class="ghost f-pinyon">Si</span>
        <span class="main-si f-pinyon">Si</span>
      </div>
      <span class="label">Pinyon Script</span>
    </div>

    <div class="card">
      <div class="si-wrap">
        <span class="ghost f-vibes">Si</span>
        <span class="main-si f-vibes">Si</span>
      </div>
      <span class="label">Great Vibes</span>
    </div>

    <div class="card">
      <div class="si-wrap">
        <span class="ghost f-dancing">Si</span>
        <span class="main-si f-dancing">Si</span>
      </div>
      <span class="label">Dancing Script</span>
    </div>

    <div class="card">
      <div class="si-wrap">
        <span class="ghost f-cormo">Si</span>
        <span class="main-si f-cormo">Si</span>
      </div>
      <span class="label">Cormorant Garamond</span>
    </div>

  </div>
</body>
</html>
